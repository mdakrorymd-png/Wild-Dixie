# One-shot free deploy of the full stack on Render (https://render.com).
# In Render: New + → Blueprint → connect this repo → Apply.
# Gives free *.onrender.com URLs (the "free domain") + a free PostgreSQL.

databases:
  - name: wild-dixie-db
    plan: free
    databaseName: wild_dixie
    user: wild_dixie

services:
  # ---- Backend (FastAPI) ----
  - type: web
    name: wild-dixie-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && alembic upgrade head && python -m scripts.seed && python -m scripts.seed_resorts && python -m scripts.seed_sokhna"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wild-dixie-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENABLE_ICAL_SCHEDULER
        value: "false"
      - key: PLATFORM_COMMISSION_PERCENT
        value: "20"
      - key: PLATFORM_INSTAPAY_ADDRESS
        value: "wilddixie@instapay"
      - key: PLATFORM_WALLET_NUMBER
        value: "01033388003"

  # ---- Frontend (Next.js) ----
  - type: web
    name: wild-dixie-web
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "/api/v1"
      # After the API deploys, set these two to its real URL in the dashboard
      # (e.g. https://wild-dixie-api.onrender.com):
      - key: BACKEND_ORIGIN
        sync: false
      - key: API_INTERNAL_URL
        sync: false
      - key: NEXT_PUBLIC_WHATSAPP
        value: "201033388003"
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_FB_PIXEL_ID
        sync: false
